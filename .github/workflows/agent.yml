name: Happi Digital — Agent IA Journalier

on:
  schedule:
    # 6h UTC = 7h Yaoundé, du lundi au samedi
    - cron: '0 6 * * 1-6'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  agent:
    name: Prospection + Blog
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm install

      - name: Generer article de blog
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: node agent/generate-post.js

      - name: Prospecter (emails)
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          GOOGLE_MAPS_API_KEY: ${{ secrets.GOOGLE_MAPS_API_KEY }}
          GMAIL_CLIENT_ID: ${{ secrets.GMAIL_CLIENT_ID }}
          GMAIL_CLIENT_SECRET: ${{ secrets.GMAIL_CLIENT_SECRET }}
          GMAIL_REFRESH_TOKEN: ${{ secrets.GMAIL_REFRESH_TOKEN }}
          GMAIL_FROM: ${{ secrets.GMAIL_FROM }}
        run: node src/agent.js

      - name: Commit et push (article + posts.json)
        run: |
          git config user.name "Happi Digital Agent"
          git config user.email "noreply@anthropic.com"
          git add posts.json blog/
          git diff --staged --quiet || git commit -m "blog: nouvel article publié le $(date '+%d/%m/%Y')"
          git push

      - name: Resume
        if: always()
        run: |
          echo "## Happi Digital Agent — $(date '+%d/%m/%Y %H:%M')" >> $GITHUB_STEP_SUMMARY
          echo "- Article de blog genere et publie" >> $GITHUB_STEP_SUMMARY
          echo "- Prospection effectuee" >> $GITHUB_STEP_SUMMARY
          echo "- Site: https://pharel.cloud" >> $GITHUB_STEP_SUMMARY
