name: Deploy — pharel.cloud

on:
  push:
    branches: [main]
  workflow_dispatch:
  workflow_run:
    workflows: ["Happi Digital — Agent IA Journalier"]
    types: [completed]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    name: Deploy to GitHub Pages
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Build le portail de brief (brief-portal)
        working-directory: brief-portal
        run: |
          npm ci
          npm run build

      - name: Préparer le contenu public (exclure les apps non déployées ici)
        run: |
          mkdir -p _site
          rsync -a --exclude='_site' --exclude='.git' --exclude='.github' \
            --exclude='.claude' --exclude='brief-portal' ./ _site/
          mkdir -p _site/brief
          cp -r brief-portal/out/. _site/brief/

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '_site'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
